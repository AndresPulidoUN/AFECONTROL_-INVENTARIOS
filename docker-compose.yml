name: afecontrol

services:

  # ─── PostgreSQL Primary ──────────────────────────────────
  postgres_primary:
    image: postgres:16
    container_name: postgres_primary
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: isp_inventarios
    ports:
      - "5433:5432"
    volumes:
      - postgres_primary_data:/var/lib/postgresql/data
      - ./postgres/primary/init.sh:/docker-entrypoint-initdb.d/init.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d isp_inventarios"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    command: >
      postgres
      -c wal_level=replica
      -c max_wal_senders=5
      -c wal_keep_size=256
      -c hot_standby=on

  # ─── PostgreSQL Replica ──────────────────────────────────
  postgres_replica:
    build:
      context: ./postgres/replica
      dockerfile: Dockerfile
    container_name: postgres_replica
    restart: unless-stopped
    ports:
      - "5434:5432"
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
    depends_on:
      postgres_primary:
        condition: service_healthy

  # ─── pgpool-II (balanceador + failover) ─────────────────
  pgpool:
    image: pgpool/pgpool:latest
    container_name: pgpool
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - ./pgpool/pgpool.conf:/config/pgpool.conf
      - ./pgpool/pool_hba.conf:/config/pool_hba.conf
      - ./pgpool/failover.sh:/config/failover.sh
    environment:
      PGPOOL_ENABLE_POOL_PASSWD: "true"
      PGPOOL_SKIP_PASSWORD_ENCRYPTION: "true"
    depends_on:
      postgres_primary:
        condition: service_healthy
      postgres_replica:
        condition: service_started

  # ─── Backend (FastAPI) ───────────────────────────────────
  backend:
    build:
      context: ./backend
    container_name: isp_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql://admin:admin123@pgpool:5432/isp_inventarios"
    depends_on:
      pgpool:
        condition: service_started

  # ─── Frontend (React + Nginx) ────────────────────────────
  frontend:
    build:
      context: ./frontend
    container_name: isp_frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_primary_data:
  postgres_replica_data:
