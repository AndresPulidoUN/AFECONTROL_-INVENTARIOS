listen_addresses = '*'
port = 5432

# Backends
backend_hostname0 = 'postgres_primary'
backend_port0 = 5432
backend_weight0 = 1
backend_data_directory0 = '/var/lib/postgresql/data'
backend_flag0 = 'ALLOW_TO_FAILOVER'

backend_hostname1 = 'postgres_replica'
backend_port1 = 5432
backend_weight1 = 1
backend_data_directory1 = '/var/lib/postgresql/data'
backend_flag1 = 'ALLOW_TO_FAILOVER'

# Health check
health_check_period = 10
health_check_timeout = 5
health_check_user = 'admin'
health_check_password = 'admin123'
health_check_database = 'isp_inventarios'
health_check_max_retries = 3
health_check_retry_delay = 1

# Failover
failover_command = '/config/failover.sh %d %h %p %D %m %H %M %P %r %R %N %S'
failover_backend = 'ERROR'

# Connection pooling
connection_cache = on
max_pool = 4
num_init_children = 32

# Auth
enable_pool_hba = on
pool_passwd = ''
allow_clear_text_frontend_auth = on

# Master/Slave mode (streaming replication)
master_slave_mode = on
master_slave_sub_mode = 'stream'

# Streaming replication check
sr_check_period = 10
sr_check_user = 'admin'
sr_check_password = 'admin123'

# Load balancing (disabled for simplicity; all queries go to primary)
load_balance_mode = off
